spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/base_llm
    username: base_llm
    password: base_llm
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
  data:
    redis:
      host: localhost
      port: 6379
  ai:
    openai:
      api-key: ${DEEPSEEK_API_KEY:}
      base-url: https://api.deepseek.com
      chat:
        options:
          model: deepseek-chat
      embedding:
        options:
          model: text-embedding-3-small
    vectorstore:
      pgvector:
        enabled: true
        index-type: HNSW
        distance-type: COSINE_DISTANCE
        dimensions: 1536

dingtalk:
  enabled: ${DINGTALK_ENABLED:false}
  client-id: ${DINGTALK_CLIENT_ID:}
  client-secret: ${DINGTALK_CLIENT_SECRET:}
