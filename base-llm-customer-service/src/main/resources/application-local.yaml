spring:
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.ai.vectorstore.pgvector.autoconfigure.PgVectorStoreAutoConfiguration
  datasource:
    url: jdbc:h2:mem:customer_service;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
  ai:
    openai:
      api-key: ${DEEPSEEK_API_KEY:local-dev-key}
      base-url: https://api.deepseek.com
      chat:
        options:
          model: deepseek-chat
      embedding:
        options:
          model: text-embedding-3-small
    vectorstore:
      pgvector:
        enabled: false

dingtalk:
  enabled: false
