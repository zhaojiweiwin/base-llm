services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: base-llm-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: base_llm
      POSTGRES_USER: base_llm
      POSTGRES_PASSWORD: base_llm
    volumes:
      - base_llm_pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: base-llm-redis
    ports:
      - "6379:6379"

volumes:
  base_llm_pg_data:
